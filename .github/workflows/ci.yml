name: CI

on:
  push:
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://user:pass@localhost:5432/db
      DB_SSL_MODE: disable
      ALVIERE_API_KEY: dummy
      ALVIERE_API_URL: https://api.alviere.com
      PLAID_CLIENT_ID: dummy
      PLAID_SECRET: dummy
      PLAID_ENV_URL: https://sandbox.plaid.com
      TABAPAY_API_KEY: dummy
      TABAPAY_API_URL: https://api.tabapay.com
      TABAPAY_WEBHOOK_SECRET: dummy
      DWOLLA_APP_KEY: dummy
      DWOLLA_APP_SECRET: dummy
      DWOLLA_ENV_URL: https://api.dwolla.com
      DWOLLA_WEBHOOK_SECRET: dummy
      DWOLLA_DEST_FUNDING_SOURCE: https://api.dwolla.com/funding-sources/dummy
      DWOLLA_SOURCE_FUNDING_SOURCE: https://api.dwolla.com/funding-sources/dummy
      JWT_SECRET: ci-test-secret-must-be-at-least-32-chars
      WEBHOOK_SHARED_SECRET: test
      WEBHOOK_MAX_SKEW_SECONDS: 300
      PORT: 18080

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Db Push
        run: bun x drizzle-kit push --config drizzle.config.ts

      - name: Migration validation
        run: bun run db:check

      - name: Smoke
        run: bun run smoke
